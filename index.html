<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ciekawe.live.rozne linki</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --text-color: #ffffff;
            --text-muted: #a9a9a9;
            --accent-color: #45f3ff;
            --accent-hover: #1f8a94;
            --tipply-color: #ff4a4a;
            --discord-color: #5865F2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .profile-container {
            max-width: 450px;
            width: 90%;
            background-color: var(--container-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(69, 243, 255, 0.1);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 span {
            color: var(--accent-color);
        }

        .description {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            color: #ffffff;
        }

        /* Styl dla Tipply */
        .btn-tipply {
            background-color: rgba(255, 74, 74, 0.1);
            border: 2px solid var(--tipply-color);
        }

        .btn-tipply:hover {
            background-color: var(--tipply-color);
            box-shadow: 0 0 20px rgba(255, 74, 74, 0.4);
            transform: translateY(-3px);
        }

        /* Styl dla Discorda */
        .btn-discord {
            background-color: rgba(88, 101, 242, 0.1);
            border: 2px solid var(--discord-color);
        }

        .btn-discord:hover {
            background-color: var(--discord-color);
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
            transform: translateY(-3px);
        }

        footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        
        <!-- Nowy nagłówek zgodnie z Twoim życzeniem -->
        <h1>ciekawe.live.rozne <span>linki</span></h1>
        <p class="description">Oficjalne linki społecznościowe oraz wsparcie twórców projektu.</p>

        <div class="links-wrapper">
            <!-- Poprawiony przycisk Tipply -->
            <a href="https://tipply.pl/@ciekawe.live.rozne" target="_blank" class="link-card btn-tipply">
                💰 Tipply
            </a>

            <!-- Poprawiony przycisk Discord -->
            <a href="https://discord.gg/drdRAbEnYh" target="_blank" class="link-card btn-discord">
                💬 Discord Steal a Xaviimsi!
            </a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Ciekawe.live.rozne. Strona stworzona przez <a href="https://github.com/jaivivo" target="_blank">jaivivo</a></p>
    </footer>

</body>
</html>
